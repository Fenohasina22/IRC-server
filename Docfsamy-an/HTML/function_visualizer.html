<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Function Visualizer — ft_irc</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#08090c;
  --panel:#0e1017;
  --card:#131620;
  --card2:#181c28;
  --border:rgba(255,255,255,0.06);
  --border2:rgba(255,255,255,0.11);
  --text:#e2e5f0;
  --muted:#5a6080;
  --dim:#2a2f40;
  --blue:#4d9ef7;
  --blue2:#7ab8ff;
  --blue-dim:rgba(77,158,247,0.12);
  --green:#3dd68c;
  --green-dim:rgba(61,214,140,0.1);
  --amber:#f5a623;
  --amber-dim:rgba(245,166,35,0.1);
  --red:#e8596a;
  --red-dim:rgba(232,89,106,0.1);
  --purple:#b48afa;
  --purple-dim:rgba(180,138,250,0.1);
  --cyan:#3dd4e8;
  --cyan-dim:rgba(61,212,232,0.1);
  --mono:'Fira Code',monospace;
  --sans:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;display:flex;flex-direction:column;}

/* ── TOP BAR ── */
.topbar{height:48px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1.25rem;gap:1.25rem;flex-shrink:0;}
.topbar-logo{font-family:var(--mono);font-size:13px;color:var(--muted);}
.topbar-logo span{color:var(--blue);}
.cat-tabs{display:flex;gap:4px;overflow-x:auto;flex:1;}
.cat-tab{padding:.3rem .8rem;border-radius:5px;font-size:12px;font-family:var(--mono);cursor:pointer;border:1px solid transparent;color:var(--muted);white-space:nowrap;transition:all .15s;}
.cat-tab:hover{color:var(--text);background:var(--card);}
.cat-tab.active{color:var(--blue);background:var(--blue-dim);border-color:rgba(77,158,247,0.25);}

/* ── MAIN LAYOUT ── */
.main{display:flex;flex:1;overflow:hidden;}

/* ── SIDEBAR ── */
.sidebar{width:190px;background:var(--panel);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;padding:.5rem 0;}
.fn-btn{display:block;width:100%;text-align:left;padding:.45rem 1rem;font-family:var(--mono);font-size:12px;color:var(--muted);background:none;border:none;cursor:pointer;transition:all .12s;border-left:2px solid transparent;}
.fn-btn:hover{color:var(--text);background:rgba(255,255,255,0.03);}
.fn-btn.active{color:var(--blue);background:var(--blue-dim);border-left-color:var(--blue);}
.fn-group-label{padding:.6rem 1rem .25rem;font-size:10px;color:var(--dim);font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase;}

/* ── CONTENT AREA ── */
.content{flex:1;overflow-y:auto;display:flex;flex-direction:column;}

/* ── FUNCTION HEADER ── */
.fn-header{padding:1.25rem 1.5rem 1rem;border-bottom:1px solid var(--border);background:var(--panel);flex-shrink:0;}
.fn-title-row{display:flex;align-items:center;gap:.75rem;margin-bottom:.4rem;}
.fn-title{font-family:var(--mono);font-size:1.3rem;font-weight:600;color:var(--text);}
.fn-cat-badge{font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:4px;}
.fn-signature{font-family:var(--mono);font-size:12px;color:var(--purple);background:var(--card2);padding:.55rem 1rem;border-radius:6px;margin-bottom:.5rem;overflow-x:auto;white-space:nowrap;}
.fn-one-liner{font-size:13px;color:#8a93b0;line-height:1.5;}

/* ── VISUAL CANVAS ── */
.vis-area{padding:1.25rem 1.5rem;flex:1;}
.vis-title{font-size:11px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.75rem;}

/* ── CONTROLS ── */
.controls{display:flex;gap:.5rem;align-items:center;margin-bottom:1rem;flex-wrap:wrap;}
.btn{background:var(--card2);border:1px solid var(--border2);color:var(--text);padding:.35rem .9rem;border-radius:5px;font-family:var(--mono);font-size:12px;cursor:pointer;transition:all .15s;}
.btn:hover{background:var(--card);border-color:var(--blue);color:var(--blue);}
.btn.primary{background:var(--blue-dim);border-color:rgba(77,158,247,0.35);color:var(--blue);}
.btn.primary:hover{background:rgba(77,158,247,0.2);}
.step-counter{font-family:var(--mono);font-size:12px;color:var(--muted);}

/* ── SCENE ── */
.scene{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1.25rem;margin-bottom:1rem;min-height:200px;position:relative;overflow:hidden;}
.scene svg{display:block;width:100%;}

/* ── LOG ── */
.log{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.75rem 1rem;font-family:var(--mono);font-size:12px;line-height:1.8;max-height:160px;overflow-y:auto;}
.log-line{padding:1px 0;}
.log-line.step{color:var(--blue2);}
.log-line.ok{color:var(--green);}
.log-line.warn{color:var(--amber);}
.log-line.err{color:var(--red);}
.log-line.info{color:var(--muted);}

/* ── PARAMS PANEL ── */
.params-panel{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.75rem 1rem;margin-bottom:.75rem;}
.param-row{display:flex;gap:.5rem;align-items:baseline;margin-bottom:.3rem;font-size:12px;}
.param-name{font-family:var(--mono);color:var(--amber);min-width:100px;}
.param-val{font-family:var(--mono);color:var(--cyan);}
.param-desc{color:var(--muted);}

/* ── ANIMATIONS ── */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes flow{from{stroke-dashoffset:20}to{stroke-dashoffset:0}}
@keyframes appear{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.anim-appear{animation:appear .3s ease}
.anim-slide{animation:slideIn .25s ease}

/* ── ENDIAN DEMO ── */
.endian-row{display:flex;gap:3px;align-items:center;font-family:var(--mono);font-size:13px;}
.byte-box{width:38px;height:34px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;border:1px solid;}

/* ── SIGSET GRID ── */
.sigset-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:3px;}
.sig-cell{height:28px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:9px;border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all .15s;}
.sig-cell.on{background:var(--blue-dim);border-color:rgba(77,158,247,0.4);color:var(--blue);}

/* ── FD TABLE ── */
.fd-table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12px;}
.fd-table th{background:var(--card2);color:var(--muted);padding:.35rem .6rem;text-align:left;border-bottom:1px solid var(--border2);}
.fd-table td{padding:.35rem .6rem;border-bottom:1px solid var(--border);vertical-align:top;}
.fd-row-new{background:rgba(61,214,140,0.06);}
.fd-row-closed{background:rgba(232,89,106,0.06);opacity:.5;}

/* scrollbar */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--dim);border-radius:3px;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">fn<span>·vis</span></div>
  <div class="cat-tabs">
    <div class="cat-tab active" onclick="filterCat('all',this)">All (30)</div>
    <div class="cat-tab" onclick="filterCat('socket',this)">Socket</div>
    <div class="cat-tab" onclick="filterCat('addr',this)">Address</div>
    <div class="cat-tab" onclick="filterCat('endian',this)">Endian</div>
    <div class="cat-tab" onclick="filterCat('io',this)">I/O</div>
    <div class="cat-tab" onclick="filterCat('signal',this)">Signals</div>
  </div>
</div>

<div class="main">
  <div class="sidebar" id="sidebar"></div>
  <div class="content" id="content">
    <div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);font-family:var(--mono);font-size:13px;">
      ← select a function
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════
// DATA — all 30 functions
// ═══════════════════════════════════════════════════════════════════════
const FUNCTIONS = [
// ── SOCKET GROUP ──────────────────────────────────────────────────────
{
  name:'socket', cat:'socket',
  sig:'int socket(int domain, int type, int protocol)',
  line:'Creates a new socket endpoint — returns a file descriptor integer.',
  render: renderSocket
},{
  name:'bind', cat:'socket',
  sig:'int bind(int sockfd, const struct sockaddr *addr, socklen_t addrlen)',
  line:'Attaches a socket to a local address and port.',
  render: renderBind
},{
  name:'listen', cat:'socket',
  sig:'int listen(int sockfd, int backlog)',
  line:'Puts socket into passive mode — starts queuing incoming connections.',
  render: renderListen
},{
  name:'accept', cat:'socket',
  sig:'int accept(int sockfd, struct sockaddr *addr, socklen_t *addrlen)',
  line:'Dequeues the next pending connection — returns a NEW fd for that client.',
  render: renderAccept
},{
  name:'connect', cat:'socket',
  sig:'int connect(int sockfd, const struct sockaddr *addr, socklen_t addrlen)',
  line:'Client side: performs the TCP 3-way handshake to a server.',
  render: renderConnect
},{
  name:'send', cat:'socket',
  sig:'ssize_t send(int sockfd, const void *buf, size_t len, int flags)',
  line:'Writes bytes into the socket send buffer — the OS handles delivery.',
  render: renderSend
},{
  name:'recv', cat:'socket',
  sig:'ssize_t recv(int sockfd, void *buf, size_t len, int flags)',
  line:'Reads bytes from the socket receive buffer — returns 0 if peer closed.',
  render: renderRecv
},{
  name:'close', cat:'socket',
  sig:'int close(int fd)',
  line:'Closes a file descriptor — releases OS resources, sends TCP FIN.',
  render: renderClose
},{
  name:'setsockopt', cat:'socket',
  sig:'int setsockopt(int sockfd, int level, int optname, const void *optval, socklen_t optlen)',
  line:'Configures socket options — e.g. SO_REUSEADDR prevents "port in use".',
  render: renderSetsockopt
},{
  name:'getsockname', cat:'socket',
  sig:'int getsockname(int sockfd, struct sockaddr *addr, socklen_t *addrlen)',
  line:'Reads back what address/port a socket is actually bound to.',
  render: renderGetsockname
},{
  name:'poll', cat:'socket',
  sig:'int poll(struct pollfd *fds, nfds_t nfds, int timeout)',
  line:'Monitors multiple fds simultaneously — wakes when any has an event.',
  render: renderPoll
},
// ── ADDRESS GROUP ─────────────────────────────────────────────────────
{
  name:'getaddrinfo', cat:'addr',
  sig:'int getaddrinfo(const char *node, const char *service, const struct addrinfo *hints, struct addrinfo **res)',
  line:'Resolves hostname + service → linked list of usable sockaddr structs.',
  render: renderGetaddrinfo
},{
  name:'freeaddrinfo', cat:'addr',
  sig:'void freeaddrinfo(struct addrinfo *res)',
  line:'Frees the linked list returned by getaddrinfo — must always be called.',
  render: renderFreeaddrinfo
},{
  name:'gethostbyname', cat:'addr',
  sig:'struct hostent *gethostbyname(const char *name)',
  line:'Legacy: resolves hostname to IP. Deprecated — prefer getaddrinfo.',
  render: renderGethostbyname
},{
  name:'getprotobyname', cat:'addr',
  sig:'struct protoent *getprotobyname(const char *name)',
  line:'Looks up protocol number by name from /etc/protocols.',
  render: renderGetprotobyname
},{
  name:'inet_ntop', cat:'addr',
  sig:'const char *inet_ntop(int af, const void *src, char *dst, socklen_t size)',
  line:'Binary IP address → human-readable string. Thread-safe. Modern.',
  render: renderInetNtop
},{
  name:'inet_addr', cat:'addr',
  sig:'in_addr_t inet_addr(const char *cp)',
  line:'String IP → binary uint32_t in network byte order. Deprecated.',
  render: renderInetAddr
},{
  name:'inet_ntoa', cat:'addr',
  sig:'char *inet_ntoa(struct in_addr in)',
  line:'Binary IPv4 → string. Deprecated — uses static buffer (not thread-safe).',
  render: renderInetNtoa
},
// ── ENDIAN GROUP ──────────────────────────────────────────────────────
{
  name:'htons', cat:'endian',
  sig:'uint16_t htons(uint16_t hostshort)',
  line:'Host → Network byte order, 16-bit. Use for port numbers.',
  render: (c,s)=>renderEndian(c,s,'htons',6667,16)
},{
  name:'htonl', cat:'endian',
  sig:'uint32_t htonl(uint32_t hostlong)',
  line:'Host → Network byte order, 32-bit. Use for IPv4 addresses.',
  render: (c,s)=>renderEndian(c,s,'htonl',0xC0A80101,32)
},{
  name:'ntohs', cat:'endian',
  sig:'uint16_t ntohs(uint16_t netshort)',
  line:'Network → Host byte order, 16-bit. Inverse of htons.',
  render: (c,s)=>renderEndian(c,s,'ntohs',0x1A0B,16,true)
},{
  name:'ntohl', cat:'endian',
  sig:'uint32_t ntohl(uint32_t netlong)',
  line:'Network → Host byte order, 32-bit. Inverse of htonl.',
  render: (c,s)=>renderEndian(c,s,'ntohl',0x0101A8C0,32,true)
},
// ── I/O GROUP ─────────────────────────────────────────────────────────
{
  name:'fcntl', cat:'io',
  sig:'int fcntl(int fd, int cmd, ... /* arg */)',
  line:'Manipulates file descriptor flags — key use: set O_NONBLOCK.',
  render: renderFcntl
},{
  name:'fstat', cat:'io',
  sig:'int fstat(int fd, struct stat *statbuf)',
  line:'Gets file metadata (size, permissions, timestamps) from an open fd.',
  render: renderFstat
},{
  name:'lseek', cat:'io',
  sig:'off_t lseek(int fd, off_t offset, int whence)',
  line:'Moves the read/write cursor position within a file.',
  render: renderLseek
},
// ── SIGNAL GROUP ──────────────────────────────────────────────────────
{
  name:'signal', cat:'signal',
  sig:'sighandler_t signal(int signum, sighandler_t handler)',
  line:'Installs a signal handler — simple but limited. Prefer sigaction.',
  render: renderSignal
},{
  name:'sigaction', cat:'signal',
  sig:'int sigaction(int signum, const struct sigaction *act, struct sigaction *oldact)',
  line:'Installs a signal handler with full control over flags and masks.',
  render: renderSigaction
},{
  name:'sigemptyset', cat:'signal',
  sig:'int sigemptyset(sigset_t *set)',
  line:'Initializes a signal set to empty — all 64 bits set to 0.',
  render: (c,s)=>renderSigset(c,s,'sigemptyset')
},{
  name:'sigfillset', cat:'signal',
  sig:'int sigfillset(sigset_t *set)',
  line:'Initializes a signal set to full — all signals included.',
  render: (c,s)=>renderSigset(c,s,'sigfillset')
},{
  name:'sigaddset', cat:'signal',
  sig:'int sigaddset(sigset_t *set, int signum)',
  line:'Adds one signal to a set.',
  render: (c,s)=>renderSigset(c,s,'sigaddset')
},{
  name:'sigdelset', cat:'signal',
  sig:'int sigdelset(sigset_t *set, int signum)',
  line:'Removes one signal from a set.',
  render: (c,s)=>renderSigset(c,s,'sigdelset')
},{
  name:'sigismember', cat:'signal',
  sig:'int sigismember(const sigset_t *set, int signum)',
  line:'Tests if a signal is present in the set — returns 1/0/-1.',
  render: (c,s)=>renderSigset(c,s,'sigismember')
}
];

const CAT_COLORS = {
  socket:{bg:'var(--blue-dim)',c:'var(--blue)'},
  addr:{bg:'var(--green-dim)',c:'var(--green)'},
  endian:{bg:'var(--amber-dim)',c:'var(--amber)'},
  io:{bg:'var(--purple-dim)',c:'var(--purple)'},
  signal:{bg:'var(--red-dim)',c:'var(--red)'}
};

// ═══════════════════════════════════════════════════════════════════════
// SIDEBAR BUILD
// ═══════════════════════════════════════════════════════════════════════
let currentFn = null;
let currentCat = 'all';

function buildSidebar(cat){
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '';
  const groups = {};
  FUNCTIONS.forEach(f=>{
    if(cat!=='all' && f.cat!==cat) return;
    if(!groups[f.cat]) groups[f.cat]=[];
    groups[f.cat].push(f);
  });
  Object.entries(groups).forEach(([c,fns])=>{
    const lbl = document.createElement('div');
    lbl.className='fn-group-label';
    lbl.textContent=c;
    sb.appendChild(lbl);
    fns.forEach(f=>{
      const btn = document.createElement('button');
      btn.className='fn-btn';
      btn.textContent=f.name+'()';
      btn.id='btn-'+f.name;
      btn.onclick=()=>selectFn(f);
      sb.appendChild(btn);
    });
  });
}

function filterCat(cat,el){
  currentCat=cat;
  document.querySelectorAll('.cat-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  buildSidebar(cat);
  document.getElementById('content').innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);font-family:var(--mono);font-size:13px;">← select a function</div>';
  currentFn=null;
}

function selectFn(fn){
  currentFn=fn;
  document.querySelectorAll('.fn-btn').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById('btn-'+fn.name);
  if(btn){btn.classList.add('active');btn.scrollIntoView({block:'nearest'});}
  const cc=CAT_COLORS[fn.cat];
  const content=document.getElementById('content');
  content.innerHTML=`
    <div class="fn-header">
      <div class="fn-title-row">
        <span class="fn-title">${fn.name}()</span>
        <span class="fn-cat-badge" style="background:${cc.bg};color:${cc.c};">${fn.cat}</span>
      </div>
      <div class="fn-signature">${fn.sig}</div>
      <div class="fn-one-liner">${fn.line}</div>
    </div>
    <div class="vis-area">
      <div class="vis-title">what happens when you call this</div>
      <div id="fn-scene"></div>
    </div>`;
  fn.render(document.getElementById('fn-scene'), fn);
}

// ═══════════════════════════════════════════════════════════════════════
// SHARED HELPERS
// ═══════════════════════════════════════════════════════════════════════
function scene(el){
  const d=document.createElement('div');d.className='scene anim-appear';
  el.appendChild(d);return d;
}
function log(el){
  const d=document.createElement('div');d.className='log';
  el.appendChild(d);return d;
}
function addLog(logEl,msg,type='info'){
  const d=document.createElement('div');d.className='log-line '+type;d.textContent=msg;
  logEl.appendChild(d);logEl.scrollTop=logEl.scrollHeight;
}
function btn(label,cls=''){
  const b=document.createElement('button');b.className='btn '+cls;b.textContent=label;return b;
}
function controls(el,...btns){
  const c=document.createElement('div');c.className='controls';
  btns.forEach(b=>c.appendChild(b));el.appendChild(c);return c;
}
function params(el,rows){
  const p=document.createElement('div');p.className='params-panel';
  rows.forEach(([n,v,d])=>{
    p.innerHTML+=`<div class="param-row"><span class="param-name">${n}</span><span class="param-val">${v}</span><span class="param-desc"> — ${d}</span></div>`;
  });
  el.appendChild(p);
}

function svgEl(tag,attrs){
  const el=document.createElementNS('http://www.w3.org/2000/svg',tag);
  Object.entries(attrs).forEach(([k,v])=>el.setAttribute(k,v));
  return el;
}
function makeSVG(w,h){
  const s=svgEl('svg',{viewBox:`0 0 ${w} ${h}`,width:'100%'});
  return s;
}

// Box with label
function svgBox(svg,x,y,w,h,label,sub,fill,stroke,textColor){
  const g=svgEl('g',{});
  g.appendChild(svgEl('rect',{x,y,width:w,height:h,rx:7,fill:fill||'#131620',stroke:stroke||'rgba(255,255,255,0.08)','stroke-width':'1'}));
  const t=svgEl('text',{x:x+w/2,y:sub?y+h/2-7:y+h/2,'text-anchor':'middle','dominant-baseline':'central','font-family':'Fira Code,monospace','font-size':'12','fill':textColor||'#e2e5f0','font-weight':'500'});
  t.textContent=label;g.appendChild(t);
  if(sub){const t2=svgEl('text',{x:x+w/2,y:y+h/2+9,'text-anchor':'middle','dominant-baseline':'central','font-family':'Fira Code,monospace','font-size':'10','fill':'#5a6080'});t2.textContent=sub;g.appendChild(t2);}
  svg.appendChild(g);return g;
}
function svgArrow(svg,x1,y1,x2,y2,color,label,dashed){
  const ln=svgEl('line',{x1,y1,x2,y2,stroke:color||'rgba(255,255,255,0.2)','stroke-width':'1.5'});
  if(dashed)ln.setAttribute('stroke-dasharray','4 3');
  svg.appendChild(ln);
  // arrowhead
  const dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy);
  if(len>0){
    const ux=dx/len,uy=dy/len;
    const px=-uy,py=ux;
    const ax=x2-ux*8,ay=y2-uy*8;
    const poly=svgEl('polygon',{points:`${x2},${y2} ${ax+px*4},${ay+py*4} ${ax-px*4},${ay-py*4}`,fill:color||'rgba(255,255,255,0.2)'});
    svg.appendChild(poly);
  }
  if(label){
    const mx=(x1+x2)/2,my=(y1+y2)/2;
    const t=svgEl('text',{x:mx+4,y:my-4,'font-family':'Fira Code,monospace','font-size':'10','fill':color||'#5a6080'});
    t.textContent=label;svg.appendChild(t);
  }
}

// ═══════════════════════════════════════════════════════════════════════
// RENDER FUNCTIONS
// ═══════════════════════════════════════════════════════════════════════

// ── socket() ────────────────────────────────────────────────────────
function renderSocket(el){
  params(el,[
    ['domain','AF_INET','IPv4 (use this always for ft_irc)'],
    ['type','SOCK_STREAM','TCP — reliable, ordered stream'],
    ['protocol','0','Auto-detect (TCP when SOCK_STREAM)'],
  ]);
  const sc=scene(el);
  const L=log(el);
  let step=0;
  const bRun=btn('Run socket()','primary');
  const bReset=btn('Reset');

// ── ENDIAN (shared) ──────────────────────────────────────────────────
function renderEndian(el,fn,fname,value,bits,reverse){
  const isHost2Net=!reverse;
  params(el,[[isHost2Net?'hostval':'netval',`0x${value.toString(16).toUpperCase().padStart(bits/4,'0')}`,`${bits}-bit value in ${isHost2Net?'host':'network'} byte order`]]);
  const sc=scene(el);const L=log(el);let step=0;
  const bRun=btn(`Run ${fname}()  ►`,'primary');const bReset=btn('Reset');
  controls(el,bRun,bReset);
  function getBytes(v,n){
    const bytes=[];
    for(let i=n-1;i>=0;i--) bytes.push((v>>(i*8))&0xFF);
    return bytes;
  }
  function draw(s){
    sc.innerHTML='';
    const numBytes=bits/8;
    const inBytes=getBytes(value,numBytes);
    const outVal=reverse?
      (bits===16?(((value&0xFF)<<8)|((value>>8)&0xFF)):(((value&0xFF)<<24)|(((value>>8)&0xFF)<<16)|(((value>>16)&0xFF)<<8)|((value>>24)&0xFF))):
      value;
    const outBytes=getBytes(outVal,numBytes);
    const bw=50,gap=6,startX=40;
    // Input row
    const inLabel=isHost2Net?'Host (your CPU — little-endian)':'Network (big-endian, wire format)';
    const t1=svgEl('text',{x:startX,y:40,'font-family':'Fira Code,monospace','font-size':'11','fill':'#4d9ef7'});t1.textContent=inLabel;sc.querySelector('svg')||sc.appendChild(makeSVG(620,200));
    const svg=sc.querySelector('svg')||makeSVG(620,200);
    if(!sc.querySelector('svg'))sc.appendChild(svg);
    svg.appendChild(t1);
    inBytes.forEach((b,i)=>{
      const x=startX+i*(bw+gap);
      const r=svgEl('rect',{x,y:50,width:bw,height:40,rx:5,fill:'rgba(77,158,247,0.12)',stroke:'rgba(77,158,247,0.3)','stroke-width':'1'});svg.appendChild(r);
      const t=svgEl('text',{x:x+bw/2,y:75,'text-anchor':'middle','font-family':'Fira Code,monospace','font-size':'14','fill':'#7ab8ff','font-weight':'500'});t.textContent=`0x${b.toString(16).toUpperCase().padStart(2,'0')}`;svg.appendChild(t);
      const ti=svgEl('text',{x:x+bw/2,y:108,'text-anchor':'middle','font-family':'Fira Code,monospace','font-size':'9','fill':'#3a4060'});ti.textContent=`byte[${i}]`;svg.appendChild(ti);
    });
    // input value
    const tv=svgEl('text',{x:startX,y:130,'font-family':'Fira Code,monospace','font-size':'12','fill':'#4d9ef7'});tv.textContent=`= 0x${value.toString(16).toUpperCase().padStart(bits/4,'0')} (${value})`;svg.appendChild(tv);
    if(s>=1){
      // function box
      svgBox(svg,340,50,100,40,fname+'()','','rgba(255,255,255,0.05)','rgba(255,255,255,0.1)','#5a6080');
      svgArrow(svg,startX+numBytes*(bw+gap),70,340,70,'rgba(255,255,255,0.2)','');
      // output row
      const outLabel=isHost2Net?'Network (big-endian) — use this in sockaddr':'Host (your CPU order) — use this in your code';
      const t2=svgEl('text',{x:460,y:40,'font-family':'Fira Code,monospace','font-size':'11','fill':'#3dd68c'});t2.textContent='Output:';svg.appendChild(t2);
      outBytes.forEach((b,i)=>{
        const x=460+i*(bw+gap);
        const changed=inBytes[i]!==outBytes[i];
        const r=svgEl('rect',{x,y:50,width:bw,height:40,rx:5,fill:changed?'rgba(61,214,140,0.15)':'rgba(61,214,140,0.06)',stroke:changed?'rgba(61,214,140,0.5)':'rgba(61,214,140,0.2)','stroke-width':'1'});svg.appendChild(r);
        const t=svgEl('text',{x:x+bw/2,y:75,'text-anchor':'middle','font-family':'Fira Code,monospace','font-size':'14','fill':'#3dd68c','font-weight':'500'});t.textContent=`0x${b.toString(16).toUpperCase().padStart(2,'0')}`;svg.appendChild(t);
      });
      const tv2=svgEl('text',{x:460,y:130,'font-family':'Fira Code,monospace','font-size':'12','fill':'#3dd68c'});tv2.textContent=`= 0x${outVal.toString(16).toUpperCase().padStart(bits/4,'0')} (${outVal>>>0})`;svg.appendChild(tv2);
    }
  }
  sc.appendChild(makeSVG(620,200));draw(0);
  addLog(L,`${fname}() swaps byte order. ${bits}-bit value.`,'info');
  bRun.onclick=()=>{
    if(step===0){step=1;draw(1);
      addLog(L,`${fname}(0x${value.toString(16).toUpperCase().padStart(bits/4,'0')}) called`,'step');
      addLog(L,`→ Input bytes reversed in memory`,'ok');
      const outVal=reverse?
        (bits===16?(((value&0xFF)<<8)|((value>>8)&0xFF)):(((value&0xFF)<<24)|(((value>>8)&0xFF)<<16)|(((value>>16)&0xFF)<<8)|((value>>24)&0xFF))):value;
      addLog(L,`→ Returns 0x${(outVal>>>0).toString(16).toUpperCase().padStart(bits/4,'0')}`,'ok');
      if(isHost2Net) addLog(L,'Use this result in sockaddr_in.sin_port or sin_addr.s_addr','info');
      else addLog(L,'Use this result in your code (printf, comparisons, etc.)','info');
      bRun.textContent='Done';bRun.disabled=true;}
  };
  bReset.onclick=()=>{step=0;draw(0);L.innerHTML='';addLog(L,'Reset.','info');bRun.textContent=`Run ${fname}()  ►`;bRun.disabled=false;};
}

    const fillW=(c/FILE_SIZE)*barW;
    const rf=svgEl('rect',{x:barX,y:barY,width:fillW,height:barH,rx:6,fill:'rgba(180,138,250,0.12)',stroke:'none'});svg.appendChild(rf);
    // labels
    [[0,'0'],[FILE_SIZE/4,'128'],[FILE_SIZE/2,'256'],[3*FILE_SIZE/4,'384'],[FILE_SIZE,'512']].forEach(([v,l])=>{
      const x=barX+(v/FILE_SIZE)*barW;
      const t=svgEl('text',{x,y:barY+barH+14,'text-anchor':'middle','font-family':'Fira Code,monospace','font-size':'9','fill':'#3a4060'});t.textContent=l;svg.appendChild(t);
    });
    // cursor
    const cx=barX+(c/FILE_SIZE)*barW;
    const cur=svgEl('rect',{x:cx-2,y:barY-4,width:4,height:barH+8,rx:2,fill:'#b48afa'});svg.appendChild(cur);
    const ct=svgEl('text',{x:cx,y:barY-10,'text-anchor':'middle','font-family':'Fira Code,monospace','font-size':'10','fill':'#b48afa'});ct.textContent=`cursor=${c}`;svg.appendChild(ct);
    // new pos arrow
    if(newPos!==undefined&&newPos!==c){
      const nx=barX+(Math.min(newPos,FILE_SIZE)/FILE_SIZE)*barW;
      svgArrow(svg,cx,barY+barH+30,nx,barY+barH+30,'rgba(61,214,140,0.6)','→ new pos');
    }
    // file size label
    const ts=svgEl('text',{x:barX+barW,y:barY-10,'text-anchor':'end','font-family':'Fira Code,monospace','font-size':'10','fill':'#3a4060'});ts.textContent='file size: 512 bytes';svg.appendChild(ts);
  }
  draw(cursor);addLog(L,'Click Run to seek. Cursor starts at 0.','info');
  bRun.onclick=()=>{
    const offset=parseInt(offsetIn.value)||0;
    const w=whenceSelect.selectedIndex;
    let newPos=w===0?offset:w===1?cursor+offset:FILE_SIZE-offset;
    newPos=Math.max(0,Math.min(FILE_SIZE,newPos));
    draw(cursor,newPos);
    addLog(L,`lseek(7, ${offset}, ${['SEEK_SET','SEEK_CUR','SEEK_END'][w]}) called`,'step');
    addLog(L,`→ Old position: ${cursor}`,'info');
    addLog(L,`→ New position: ${newPos}`,'ok');
    addLog(L,`→ Returns ${newPos} (new absolute position)`,'ok');
    cursor=newPos;
    setTimeout(()=>draw(cursor),300);
  };
  bReset.onclick=()=>{cursor=0;draw(0);L.innerHTML='';addLog(L,'Cursor reset to 0.','info');};
  el.appendChild(L);
}

// ── signal() ─────────────────────────────────────────────────────────
function renderSignal(el){
  params(el,[
    ['signum','SIGINT','Signal to handle (Ctrl+C)'],
    ['handler','my_handler','Your function: void my_handler(int sig)'],
  ]);
  const sc=scene(el);const L=log(el);let step=0;
  const bRun=btn('Install handler','primary');const bCtrlC=btn('Press Ctrl+C (simulate)');bCtrlC.disabled=true;
  const bReset=btn('Reset');
  controls(el,bRun,bCtrlC,bReset);
  function draw(s){
    sc.innerHTML='';
    const svg=makeSVG(620,200);sc.appendChild(svg);
    svgBox(svg,20,60,140,60,'Your Program','main loop\nrunning','#131620','rgba(77,158,247,0.25)','#7ab8ff');
    // signal table
    svgBox(svg,230,30,200,150,'Signal Dispatch Table','OS kernel','#0e1017','rgba(255,255,255,0.08)','#5a6080');
    const sigs=[['SIGHUP','SIG_DFL'],['SIGINT',s>=1?'my_handler()':'SIG_DFL'],['SIGTERM','SIG_DFL'],['SIGSEGV','SIG_DFL']];
    sigs.forEach(([name,handler],i)=>{
      const active=name==='SIGINT'&&s>=1;
      const fc=active?'rgba(61,214,140,0.1)':'rgba(255,255,255,0.02)';
      const fb=active?'rgba(61,214,140,0.3)':'rgba(255,255,255,0.05)';
      const r=svgEl('rect',{x:238,y:50+i*26,width:184,height:22,rx:3,fill:fc,stroke:fb,'stroke-width':'0.5'});svg.appendChild(r);
      const t=svgEl('text',{x:244,y:65+i*26,'font-family':'Fira Code,monospace','font-size':'10','fill':active?'#3dd68c':'#3a4060'});t.textContent=`${name}: ${handler}`;svg.appendChild(t);
    });
    svgArrow(svg,160,90,230,80,'rgba(77,158,247,0.4)','registers');
    // handler box
    svgBox(svg,490,80,120,80,'my_handler()','void my_handler\n(int sig){\ng_running=0;\n}',s>=2?'rgba(245,166,35,0.1)':'rgba(77,158,247,0.05)',s>=2?'rgba(245,166,35,0.3)':'rgba(77,158,247,0.15)','#4d9ef7');
    if(s>=2){
      svgArrow(svg,430,140,490,140,'rgba(245,166,35,0.6)','SIGINT calls');
    }
  }
  draw(0);addLog(L,'signal() installs a function to run when a signal arrives.','info');
  bRun.onclick=()=>{
    if(step===0){step=1;draw(1);
      addLog(L,'signal(SIGINT, my_handler) called','step');
      addLog(L,'→ Old SIGINT handler (SIG_DFL) saved','ok');
      addLog(L,'→ SIGINT entry in dispatch table → my_handler','ok');
      addLog(L,'→ Returns old handler (SIG_DFL)','ok');
      addLog(L,'Now Ctrl+C will call my_handler(SIGINT) instead of killing process','info');
      bCtrlC.disabled=false;bRun.disabled=true;bRun.textContent='Done';}
  };
  bCtrlC.onclick=()=>{
    if(step===1){step=2;draw(2);
      addLog(L,'User pressed Ctrl+C — OS sends SIGINT to process','warn');
      addLog(L,'→ OS interrupts main loop at current instruction','warn');
      addLog(L,'→ Calls my_handler(SIGINT)','step');
      addLog(L,'→ my_handler sets g_running = 0','ok');
      addLog(L,'→ Returns to interrupted code — loop sees g_running=0 and exits','ok');
      addLog(L,'DO NOT do complex work in signal handler — just set a flag!','err');
      bCtrlC.disabled=true;}
  };
  bReset.onclick=()=>{step=0;draw(0);L.innerHTML='';addLog(L,'Reset.','info');bRun.textContent='Install handler';bRun.disabled=false;bCtrlC.disabled=true;};
}

// ── sigaction() ──────────────────────────────────────────────────────
function renderSigaction(el){
  params(el,[
    ['signum','SIGINT','Signal to handle'],
    ['act','&sa','New action struct (handler + mask + flags)'],
    ['oldact','NULL','If non-NULL, old action is saved here'],
  ]);
  const sc=scene(el);const L=log(el);let step=0;
  const bRun=btn('Run sigaction()','primary');const bReset=btn('Reset');
  controls(el,bRun,bReset);
  function draw(s){
    sc.innerHTML='';
    const svg=makeSVG(620,200);sc.appendChild(svg);
    // struct sigaction
    svgBox(svg,20,30,230,150,'struct sigaction sa','','#0e1017','rgba(180,138,250,0.25)','#b48afa');
    const fields=[
      ['.sa_handler','my_handler','function to call'],
      ['.sa_mask','sigemptyset','signals blocked during call'],
      ['.sa_flags','SA_RESTART','restart syscalls after signal'],
    ];
    fields.forEach(([name,val,desc],i)=>{
      const t=svgEl('text',{x:30,y:65+i*32,'font-family':'Fira Code,monospace','font-size':'11','fill':s>=1?'#b48afa':'#3a4060'});t.textContent=`${name} = ${val}`;svg.appendChild(t);
      const t2=svgEl('text',{x:30,y:79+i*32,'font-family':'Fira Code,monospace','font-size':'9','fill':'#3a4060'});t2.textContent=`  // ${desc}`;svg.appendChild(t2);
    });
    svgBox(svg,320,60,280,120,'Signal dispatch','SIGINT → ?','#0e1017','rgba(255,255,255,0.08)','#5a6080');
    if(s>=1){
      svgArrow(svg,250,105,320,105,'rgba(180,138,250,0.5)','installs');
      const t=svgEl('text',{x:340,y:100,'font-family':'Fira Code,monospace','font-size':'11','fill':'#b48afa'});t.textContent='SIGINT → my_handler';svg.appendChild(t);
      const t2=svgEl('text',{x:340,y:118,'font-family':'Fira Code,monospace','font-size':'10','fill':'#5a6080'});t2.textContent='mask: {} (empty)';svg.appendChild(t2);
      const t3=svgEl('text',{x:340,y:134,'font-family':'Fira Code,monospace','font-size':'10','fill':'#5a6080'});t3.textContent='flags: SA_RESTART';svg.appendChild(t3);
      const t4=svgEl('text',{x:340,y:150,'font-family':'Fira Code,monospace','font-size':'10','fill':'#5a6080'});t4.textContent='→ syscalls auto-restart';svg.appendChild(t4);
    }
    const note=svgEl('text',{x:20,y:195,'font-family':'Fira Code,monospace','font-size':'10','fill':'#3a4060'});
    note.textContent='SA_RESTART: if signal interrupts read()/write(), they restart automatically';svg.appendChild(note);
  }
  draw(0);addLog(L,'sigaction() is safer than signal() — gives full control over behavior.','info');
  bRun.onclick=()=>{
    if(step===0){step=1;draw(1);
      addLog(L,'sigaction(SIGINT, &sa, NULL) called','step');
      addLog(L,'→ Installs my_handler for SIGINT','ok');
      addLog(L,'→ sa_mask={}: no additional signals blocked during handler','ok');
      addLog(L,'→ SA_RESTART: interrupted syscalls (read,write,poll) auto-restart','ok');
      addLog(L,'→ Returns 0 (success)','ok');
      addLog(L,'Better than signal(): defined behavior, can save old handler, set flags','info');
      bRun.textContent='Done';bRun.disabled=true;}
  };
  bReset.onclick=()=>{step=0;draw(0);L.innerHTML='';addLog(L,'Reset.','info');bRun.textContent='Run sigaction()';bRun.disabled=false;};
}

// ── SIGSET (shared for all 5 sigset functions) ────────────────────────
function renderSigset(el,fn,fname){
  const SIGS=['SIGHUP','SIGINT','SIGQUIT','SIGILL','SIGTRAP','SIGABRT','SIGBUS','SIGFPE','SIGKILL','SIGUSR1','SIGSEGV','SIGUSR2','SIGPIPE','SIGALRM','SIGTERM','SIGSTKFLT','SIGCHLD','SIGCONT','SIGSTOP','SIGTSTP','SIGTTIN','SIGTTOU','SIGURG','SIGXCPU','SIGXFSZ','SIGVTALRM','SIGPROF','SIGWINCH','SIGIO','SIGPWR','SIGSYS','_'];
  let set=new Array(32).fill(false);
  let selectedSig=1; // SIGINT = index 1

  if(fname==='sigfillset') set=set.map(()=>true);

  const sc=scene(el);const L=log(el);

  // controls
  let sigSelect=null;
  if(['sigaddset','sigdelset','sigismember'].includes(fname)){
    sigSelect=document.createElement('select');
    sigSelect.style.cssText='background:var(--card2);border:1px solid var(--border2);color:var(--text);padding:.3rem .6rem;border-radius:5px;font-family:var(--mono);font-size:12px;';
    SIGS.slice(0,16).forEach((s,i)=>{const o=document.createElement('option');o.value=i;o.textContent=s;sigSelect.appendChild(o);});
    sigSelect.value=1;
    sigSelect.onchange=()=>{selectedSig=parseInt(sigSelect.value);};
  }
  const bRun=btn(`Run ${fname}()`,'primary');
  const bReset=btn('Reset');
  const ctr=document.createElement('div');ctr.className='controls';
  ctr.appendChild(bRun);ctr.appendChild(bReset);
  if(sigSelect)ctr.appendChild(sigSelect);
  el.appendChild(ctr);

  params(el,fname==='sigemptyset'?[['set','&mask','Signal set to initialize to empty']]:
    fname==='sigfillset'?[['set','&mask','Signal set to fill with all signals']]:
    fname==='sigaddset'?[['set','&mask','Target set'],['signum','SIGINT','Signal to add']]:
    fname==='sigdelset'?[['set','&mask','Target set'],['signum','SIGINT','Signal to remove']]:
    [['set','&mask','Set to query'],['signum','SIGINT','Signal to test']]);

  function draw(){
    sc.innerHTML='';
    const wrap=document.createElement('div');
    const title=document.createElement('div');
    title.style.cssText='font-family:var(--mono);font-size:10px;color:var(--muted);margin-bottom:.5rem;';
    title.textContent='sigset_t (64-bit bitmask — each bit = one signal)';
    wrap.appendChild(title);
    const grid=document.createElement('div');
    grid.className='sigset-grid';
    set.forEach((on,i)=>{
      const c=document.createElement('div');
      c.className='sig-cell'+(on?' on':'');
      const name=SIGS[i]||`SIG${i+1}`;
      c.textContent=name.replace('SIG','');
      c.title=name;
      if(sigSelect){
        c.onclick=()=>{sigSelect.value=i;selectedSig=i;};
      }
      if(i===selectedSig&&sigSelect){
        c.style.outline='1px solid var(--amber)';c.style.outlineOffset='2px';
      }
      grid.appendChild(c);
    });
    wrap.appendChild(grid);
    // legend
    const leg=document.createElement('div');
    leg.style.cssText='display:flex;gap:1rem;margin-top:.6rem;font-size:11px;color:var(--muted);font-family:var(--mono);';
    leg.innerHTML='<span style="color:var(--blue)">■</span> in set &nbsp; <span style="color:var(--border2)">□</span> not in set &nbsp; <span style="color:var(--amber)">□</span> selected signal';
    wrap.appendChild(leg);
    sc.appendChild(wrap);
  }
  draw();
  addLog(L,`${fname}() operates on a sigset_t bitmask.`,'info');
  if(fname==='sigismember') addLog(L,'Click "Run sigismember()" to test if selected signal is in the set.','info');

  bRun.onclick=()=>{
    if(fname==='sigemptyset'){
      set=set.map(()=>false);draw();
      addLog(L,'sigemptyset(&mask) called','step');
      addLog(L,'→ All 32 signal bits set to 0','ok');
      addLog(L,'→ Returns 0 (success)','ok');
      addLog(L,'Always call this before using a sigset_t!','warn');
    } else if(fname==='sigfillset'){
      set=set.map(()=>true);draw();
      addLog(L,'sigfillset(&mask) called','step');
      addLog(L,'→ All 32 signal bits set to 1','ok');
      addLog(L,'→ Returns 0 (success)','ok');
      addLog(L,'Used to block ALL signals during critical sections','info');
    } else if(fname==='sigaddset'){
      const name=SIGS[selectedSig];
      if(set[selectedSig]){addLog(L,`${name} already in set — no change`,'warn');return;}
      set[selectedSig]=true;draw();
      addLog(L,`sigaddset(&mask, ${name}) called`,'step');
      addLog(L,`→ Bit ${selectedSig} (${name}) set to 1`,'ok');
      addLog(L,'→ Returns 0 (success)','ok');
    } else if(fname==='sigdelset'){
      const name=SIGS[selectedSig];
      if(!set[selectedSig]){addLog(L,`${name} not in set — no change`,'warn');return;}
      set[selectedSig]=false;draw();
      addLog(L,`sigdelset(&mask, ${name}) called`,'step');
      addLog(L,`→ Bit ${selectedSig} (${name}) set to 0`,'ok');
      addLog(L,'→ Returns 0 (success)','ok');
    } else if(fname==='sigismember'){
      const name=SIGS[selectedSig];
      const result=set[selectedSig]?1:0;
      addLog(L,`sigismember(&mask, ${name}) called`,'step');
      addLog(L,`→ Checks bit ${selectedSig} (${name})`,'ok');
      addLog(L,`→ Returns ${result} (${result?'YES — in set':'NO — not in set'})`,(result?'ok':'warn'));
    }
  };
  bReset.onclick=()=>{
    set=fname==='sigfillset'?new Array(32).fill(true):new Array(32).fill(false);
    selectedSig=1;if(sigSelect)sigSelect.value=1;
    draw();L.innerHTML='';addLog(L,'Reset.','info');
  };
  el.appendChild(L);
}
